name: Deploy to VPS
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 30m
          script: |
            cd /opt/stagethree
            git fetch origin
            git reset --hard origin/main
            
            # Create root .env

            cat > .env << EOF
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_TURNSTILE_SITE_KEY=${{ secrets.VITE_TURNSTILE_SITE_KEY }}
            R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET_PROD }}
            TURNSTILE_SECRET=${{ secrets.TURNSTILE_SECRET }}
            EOF
            
            # Create server .env
            cat > server/.env << EOF
            NODE_ENV=production
            DB_USER=${{ secrets.DB_USER }}
            DB_HOST=postgres
            DB_NAME=stagethree
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@postgres:5432/stagethree
            JWT_SECRET=${{ secrets.JWT_SECRET_PROD }}
            DEMO_USER_PASSWORD=${{ secrets.DEMO_USER_PASSWORD }}
            ADMIN_USER_PASSWORD=${{ secrets.ADMIN_USER_PASSWORD }}
            REGULAR_USER_PASSWORD=${{ secrets.REGULAR_USER_PASSWORD }}
            SUPER_USER_PASSWORD=${{ secrets.SUPER_USER_PASSWORD }}
            EOF
            
            docker-compose down
            docker-compose up -d --build
